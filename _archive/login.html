  <style>
    :root {
      --primary: #2575fc;
      --primary-dark: #1b5edc;
      --error: #dc3545;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(0,0,0,0.15);
      --transition: all .3s ease;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body {
      font-family: 'Dongrek', 'Noto Sans Khmer', sans-serif;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #00c6ff, #f7797d);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      flex-direction: column;
    }

    @keyframes gradientBG {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    .auth-container {
      width:100%;
      max-width:400px;
      animation: fadeIn 1s ease;
    }
    .auth-box {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      padding: 40px 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align:center;
      transform: translateY(0);
      transition: var(--transition);
    }
    .auth-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    }
    .auth-box h2 {
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 700;
      color: #222;
    }

    /* kleng pjo fields */
    #loginForm input[type="email"],
    #loginForm input[type="password"] {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:1px solid #ddd;
      border-radius: var(--radius);
      font-size:16px;
      transition: var(--transition);
    }
    #loginForm input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,117,252,0.2);
      outline:none;
    }

    /* kleng joch button */
    .btn {
      width:100%;
      padding:15px;
      background: var(--primary);
      color:white;
      border:none;
      border-radius: var(--radius);
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition: var(--transition);
      box-shadow:0 8px 20px rgba(37,117,252,0.3);
      position: relative;
    }
    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow:0 10px 28px rgba(37,117,252,0.35);
    }
    .btn:active {
      transform: scale(0.98);
    }

    /* Loading  inside Button */
    .btn.loading {
      pointer-events:none;
      opacity:0.8;
    }
    .btn.loading::after {
      content:"";
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      width:18px;
      height:18px;
      border:3px solid #fff;
      border-radius:50%;
      border-top-color:transparent;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {transform:translateY(-50%) rotate(360deg);}
    }

    /* Links */
    .auth-box p {
      margin-top:18px;
      font-size:14px;
      color:#555;
    }
    .auth-box a {
      color: var(--primary);
      font-weight:600;
      text-decoration:none;
      transition: var(--transition);
    }
    .auth-box a:hover {
      text-decoration:underline;
    }

    /* pel Error */
    #auth-error {
      margin-top:10px;
      color: var(--error);
      font-weight:600;
      min-height:20px;
    }

    footer {
      margin-top:20px;
      font-size:13px;
      color:#fff;
      text-align:center;
      opacity:0.9;
      animation: fadeIn 2s ease;
    }

    /* dak Animation */
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }

    /* Responsive */
    @media(max-width:600px) {
      .auth-box {
        padding:30px 20px;
      }
      .auth-box h2 {
        font-size:22px;
      }
      .btn {
        font-size:15px;
        padding:13px;
      }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByOAeLSs6GItG-m0qzBQ19HgFhWSv-J6U",
      authDomain: "x-flow-studio.firebaseapp.com",
      databaseURL: "https://x-flow-studio-default-rtdb.firebaseio.com",
      projectId: "x-flow-studio",
      storageBucket: "x-flow-studio.firebasestorage.app",
      messagingSenderId: "608679807495",
      appId: "1:608679807495:web:403bea2d684dc324d338a2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorDisplay = document.getElementById('auth-error');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDisplay.textContent = '';
      loginBtn.classList.add("loading"); // bong hanh spinner

      const email = emailInput.value;
      const password = passwordInput.value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const welcomeName = user.displayName || user.email;
        // Custom popup notification instead of alert
        const notif = document.createElement('div');
        notif.textContent = " ចូលបានជោគជ័យ!✅ ត្រូវខិតខំរៀនលឺនៅ "+ welcomeName+ " កុំខ្ជិលដូចពួកបងៗ :P";
        notif.style.position = 'fixed';
        notif.style.top = '32px';
        notif.style.left = '50%';
        notif.style.transform = 'translateX(-50%)';
        notif.style.background = '#22c55e';
        notif.style.color = '#fff';
        notif.style.padding = '18px 28px';
        notif.style.borderRadius = '14px';
        notif.style.boxShadow = '0 4px 24px #0003';
        notif.style.fontSize = '1.15em';
        notif.style.zIndex = '99999';
        notif.style.textAlign = 'center';
        notif.style.fontWeight = 'bold';
        notif.style.letterSpacing = '0.5px';
        notif.style.opacity = '0.98';
        notif.style.transition = 'opacity 0.4s';
        notif.style.fontFamily = "'Angkor', 'Hanuman', 'Noto Sans Khmer', Arial, sans-serif";
        document.body.appendChild(notif);
        setTimeout(() => { notif.style.opacity = '0'; }, 2700);
        setTimeout(() => {
          notif.remove();
          window.location.href = "/welcome";
        }, 3200);
      } catch (error) {
        let errorMessage;
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = 'អ៊ីមែលនេះមិនទាន់បានចុះឈ្មោះទេ។';
            break;
          case 'auth/wrong-password':
            errorMessage = 'ពាក្យសម្ងាត់មិនត្រឹមត្រូវទេ។';
            break;
          case 'auth/invalid-email':
            errorMessage = 'អ៊ីមែលមិនត្រឹមត្រូវទេ។';
            break;
          default:
            errorMessage = ' 😒គ្រាន់តែ Gmail ​និង Password ក៏មិនចាំរំពាត់ឥលូវហើយ។ ព្យាយាមម្តងទៀត 🥲';
        }
        errorDisplay.textContent = errorMessage;
        console.error("Login Error: ", error);
      } finally {
        loginBtn.classList.remove("loading"); // បិទspinnerវិញ
      }
    });
  </script>
  
  <script>
  window.addEventListener('load', function() {
    if (!window.location.search) {
        
        //  បង្កើតផ្នែកតូចៗនៃកូដ (Random Parts)
        const part1 = Math.random().toString(36).substring(2);
        const part2 = Math.random().toString(36).substring(2);
        const part3 = Date.now().toString(36); // យកម៉ោងមកដាក់
        
        const rawString = `Rotana-${part1}-${part2}-${part3}-Secure`;

        //  បំប្លែងទៅជាកូដសម្ងាត់វែង (Base64) ឱ្យមើលទៅកាច
        // btoa គឺជា function បំប្លែងអក្សរធម្មតាទៅជាកូដ Base64
        const longHash = btoa(rawString + rawString); 

        const newUrl = window.location.pathname + 
                       '?srsltid=' + longHash + 
                       '&ref_src=' + part1 + 
                       '&camp_id=' + Date.now();
        
        // ប្តូរ URL លើ Browser ភ្លាមៗ
        window.history.replaceState(null, '', newUrl);
    }
  });

</script>
<script src="assets/js/cookie.js"></script>
<script>
// --- Cookie Consent Alert ---
function showCookieConsent() {
  if (getCookie('rotana_cookie_consent')) return;
  const alertDiv = document.createElement('div');
  alertDiv.id = 'cookieConsentAlert';
  alertDiv.style.position = 'fixed';
  alertDiv.style.bottom = '24px';
  alertDiv.style.left = '50%';
  alertDiv.style.transform = 'translateX(-50%)';
  alertDiv.style.background = '#22c55e';
  alertDiv.style.color = '#fff';
  alertDiv.style.padding = '10px 8px';
  alertDiv.style.borderRadius = '7px';
  alertDiv.style.boxShadow = '0 2px 8px #0001';
  alertDiv.style.zIndex = '9999';
  alertDiv.style.display = 'flex';
  alertDiv.style.alignItems = 'center';
  alertDiv.style.justifyContent = 'center';
  alertDiv.style.maxWidth = '95vw';
  alertDiv.style.fontSize = '1em';
  alertDiv.style.wordBreak = 'break-word';
  alertDiv.innerHTML = `
    <span style="font-size:1em;margin-right:10px;">វេបសាយនេះប្រើ Cookies ដើម្បីបង្កើនបទពិសោធន៍អ្នកប្រើប្រាស់។</span>
    <button id="cookieAccept" style="background:#fff;color:#22c55e;border:none;padding:5px 12px;border-radius:5px;font-weight:bold;cursor:pointer;font-size:1em;margin-left:8px;">យល់ព្រម</button>
    <button id="cookieReject" style="background:#e5e7eb;color:#374151;border:none;padding:5px 12px;border-radius:5px;font-weight:bold;cursor:pointer;font-size:1em;margin-left:6px;">បដិសេធ</button>
  `;
  document.body.appendChild(alertDiv);
  document.getElementById('cookieAccept').onclick = function() {
    setCookie('rotana_cookie_consent', 'accepted', 365);
    alertDiv.remove();
  };
  document.getElementById('cookieReject').onclick = function() {
    setCookie('rotana_cookie_consent', 'rejected', 365);
    alertDiv.remove();
  };
}
window.addEventListener('DOMContentLoaded', showCookieConsent);
</script>

</script>
